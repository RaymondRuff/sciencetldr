name: monday-podcast

on:
  workflow_run:
    workflows: ["digest"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  select:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv sync

      - name: Pick paper and open Issue
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          SELECTION_SOURCE: monday-digest
        run: uv run python scripts/select_monday_paper.py
