name: digest

on:
  schedule:
    # Mondays 06:00 ET (= 11:00 UTC during EST, 10:00 UTC during EDT)
    # Runs at 11:00 UTC year-round; will land at 6am ET in winter, 7am ET in summer.
    - cron: '0 11 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - run: uv sync

      - name: Run digest agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DIGEST_RECIPIENTS: ${{ secrets.DIGEST_RECIPIENTS }}
        run: uv run python scripts/digest.py

      - name: Commit digest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digest/
          if git diff --cached --quiet; then
            echo "No new digest to commit"
            exit 0
          fi
          git commit -m "digest: weekly $(date +%Y-%m-%d) [skip ci]"
          git push
