name: publish

on:
  push:
    branches: [main]
    paths:
      - 'inbox/**.mp3'
      - 'inbox/**.m4a'
      - 'inbox/**.mp4a'
      - 'inbox/**.wav'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Cache whisper models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: whisper-hf-cache-v1

      - name: Publish episode(s)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
        run: uv run python scripts/publish_episode.py

      - name: Commit episode + feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add episodes/ feed.xml inbox/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "publish: new episode(s) [skip ci]"
          git push
